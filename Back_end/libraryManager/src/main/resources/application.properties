# 1. Database connection
spring.datasource.url=jdbc:mysql://localhost:3306/library_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# 2. Hibernate/JPA - Chỉ giữ 1 dòng ddl-auto
# 'update' giúp giữ lại dữ liệu cũ và chỉ cập nhật cột mới
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. Security (Tạm thời để test, sau này nên dùng DB để lưu user)
spring.security.user.name=admin
spring.security.user.password=123456

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true

# Đường dẫn thư mục lưu ảnh (Ví dụ: C:/library/uploads/ hoặc /home/vu/uploads/)
file.upload-dir=C:/library_data/uploads
file.upload-dir.books=${file.upload-dir}/books
file.upload-dir.rooms=${file.upload-dir}/rooms
file.upload-dir.cabinets=${file.upload-dir}/cabinets

# Cấu hình giới hạn kích thước file
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


open.api.title=Library Management API
open.api.version=1.0
open.api.description=API documentation for the Library Management System
open.api.serverUrl=http://localhost:8080
open.api.serverName=Local Server
