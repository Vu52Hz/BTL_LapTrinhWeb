<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Trang Chủ - My Library</title>
    <link rel="stylesheet" href="/Front_end/CSS/Main_Style.css" />
  </head>
  <body>
    <header class="top-header" id="commonHeader"></header>

    <div class="app-layout">
      <aside class="side-navigation" id="sidebarMenu"></aside>

      <main class="app-container">
        <section class="toolbar">
          <div class="search-box">
            <input
              type="text"
              id="homeSearch"
              placeholder="Tìm sách nhanh..."
              oninput="renderFeaturedBooks()"
            />
          </div>
          <button class="btn-add" id="btnMainAction">Tạo đơn mượn nhanh</button>
        </section>

        <div id="libraryInfoContainer"></div>

        <hr class="divider" />

        <h3 id="featuredTitle" class="section-title">
          Sách đề xuất mượn nhiều
        </h3>
        <div
          class="book-grid"
          id="featuredBooks"
          style="display: flex; flex-wrap: wrap; gap: 20px"
        ></div>
      </main>
    </div>

    <div id="modalEditInfo" class="modal-overlay">
      <div class="modal-card">
        <span class="modal-card__close" onclick="closeModal('modalEditInfo')"
          >&times;</span
        >
        <div class="modal-card__title">SỬA THÔNG TIN CƠ SỞ</div>
        <div class="modal-card__body">
          <div class="modal-card__input-area">
            <input
              type="text"
              id="editLibName"
              class="input-field"
              placeholder="Tên cơ sở"
            />
            <input
              type="text"
              id="editLibAddress"
              class="input-field"
              placeholder="Địa chỉ"
            />
            <input
              type="text"
              id="editLibHotline"
              class="input-field"
              placeholder="Hotline"
            />
            <textarea
              id="editLibDesc"
              class="input-field"
              placeholder="Mô tả ngắn"
              rows="3"
            ></textarea>
          </div>
        </div>
        <button class="btn-submit" onclick="saveLibraryInfo()">
          Lưu thay đổi
        </button>
      </div>
    </div>

    <script src="/Front_end/JS/common.js"></script>
    <script src="/Front_end/JS/booking-handler.js"></script>
    <script src="/Front_end/JS/trangchu.js"></script>
  </body>
</html>
