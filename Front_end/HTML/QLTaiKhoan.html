<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Quản lý tài khoản - My Library</title>
    <link rel="stylesheet" href="/Front_end/CSS/Main_Style.css" />
  </head>
  <body>
    <header class="top-header" id="commonHeader"></header>
    <div class="app-layout">
      <aside class="side-navigation" id="sidebarMenu"></aside>
      <main class="app-container">
        <div class="toolbar" style="flex-wrap: wrap">
          <div class="search-box">
            <input
              type="text"
              id="userSearch"
              placeholder="Tìm tên hoặc username..."
              oninput="renderUsers()"
            />
          </div>

          <div
            class="date-filter"
            style="
              display: flex;
              gap: 10px;
              margin-left: 20px;
              align-items: center;
            "
          >
            <label
              >Từ:
              <input
                type="date"
                id="startDate"
                onchange="
                  renderUsers();
                  renderUserChart();
                "
                class="input-field"
                style="width: auto; padding: 5px"
            /></label>
            <label
              >Đến:
              <input
                type="date"
                id="endDate"
                onchange="
                  renderUsers();
                  renderUserChart();
                "
                class="input-field"
                style="width: auto; padding: 5px"
            /></label>
          </div>

          <div
            class="filter-group"
            style="
              display: flex;
              gap: 15px;
              align-items: center;
              margin-left: 20px;
            "
          >
            <label
              ><input
                type="checkbox"
                id="filterActive"
                checked
                onchange="renderUsers()"
              />
              Hoạt động</label
            >
            <label
              ><input
                type="checkbox"
                id="filterLocked"
                checked
                onchange="renderUsers()"
              />
              Bị khóa</label
            >
          </div>
          <button class="btn-add" onclick="openUserModal()">
            Thêm tài khoản
          </button>
        </div>

        <div
          id="statSection"
          class="statistics-area"
          style="
            margin: 15px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            gap: 20px;
            font-size: 16px;
          "
        >
          <span>📊 <b>THỐNG KÊ (Tính đến ngày chọn):</b></span>
          <span style="color: #0d6efd"
            >Tổng tài khoản: <b id="statTotal">0</b></span
          >
          <span style="color: #198754"
            >Đang hoạt động: <b id="statActive">0</b></span
          >
          <span style="color: #dc3545">Bị khóa: <b id="statLocked">0</b></span>
        </div>

        <div id="chartContainer" style="margin-top: 20px">
          <canvas id="userChart" height="100"></canvas>
        </div>
        <div id="chartContainer" style="margin-top: 20px">
          <canvas id="userChart" height="100"></canvas>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Họ tên</th>
                <th>Email</th>
                <th>Số điện thoại</th>
                <th>Tên đăng nhập</th>
                <th>Vai trò</th>
                <th>Ngày tạo</th>
                <th>Trạng thái (Tại thời điểm B)</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
          </table>
        </div>

        <div id="modalEditUser" class="modal-overlay">
          <div class="modal-card">
            <span
              class="modal-card__close"
              onclick="closeModal('modalEditUser')"
              >&times;</span
            >
            <div class="modal-card__title" id="userModalTitle">
              THÊM TÀI KHOẢN MỚI
            </div>
            <div class="modal-card__body">
              <div class="modal-card__input-area">
                <input
                  type="text"
                  id="editFullname"
                  class="input-field"
                  placeholder="Họ và tên"
                />
                <input
                  type="text"
                  id="editEmail"
                  class="input-field"
                  placeholder="Email"
                />
                <input
                  type="text"
                  id="editPhone"
                  class="input-field"
                  placeholder="Số điện thoại"
                />
                <input
                  type="text"
                  id="editUsername"
                  class="input-field"
                  placeholder="Tên đăng nhập"
                />
                <input
                  type="password"
                  id="editPassword"
                  class="input-field"
                  placeholder="Mật khẩu"
                />
                <div class="show-password-container">
                  <input
                    type="checkbox"
                    id="check-login"
                    onclick="togglePassword('editPassword')"
                  />
                  <label for="check-login">Hiển thị mật khẩu</label>
                </div>
              </div>
            </div>
            <button class="btn-submit" onclick="saveUser()">
              Lưu tài khoản
            </button>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/Front_end/JS/common.js"></script>
    <script src="/Front_end/JS/qltaikhoan.js"></script>
  </body>
</html>
